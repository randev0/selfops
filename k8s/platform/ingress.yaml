---
# Frontend ingress — selfops.steadigital.com
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: selfops-frontend-ingress
  namespace: platform
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - selfops.steadigital.com
      secretName: selfops-frontend-tls
  rules:
    - host: "selfops.steadigital.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: selfops-frontend
                port:
                  number: 3000
---
# API ingress — api-selfops.steadigital.com
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: selfops-api-ingress
  namespace: platform
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api-selfops.steadigital.com
      secretName: selfops-api-tls
  rules:
    - host: "api-selfops.steadigital.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: selfops-api
                port:
                  number: 8000
