---
# ServiceAccount for the analysis service (needs k8s API read access for the get_k8s_resource_yaml tool)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: selfops-analysis
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: selfops-analysis-reader
  namespace: platform
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: selfops-analysis-reader
  namespace: platform
subjects:
  - kind: ServiceAccount
    name: selfops-analysis
    namespace: platform
roleRef:
  kind: Role
  name: selfops-analysis-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selfops-analysis
  namespace: platform
  labels:
    app: selfops-analysis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selfops-analysis
  template:
    metadata:
      labels:
        app: selfops-analysis
    spec:
      serviceAccountName: selfops-analysis
      containers:
        - name: analysis
          image: docker.io/library/selfops-analysis:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          env:
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: selfops-secrets
                  key: openrouter-api-key
            - name: PROMETHEUS_URL
              value: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
            - name: LOKI_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: selfops-analysis
  namespace: platform
spec:
  selector:
    app: selfops-analysis
  ports:
    - port: 8001
      targetPort: 8001
