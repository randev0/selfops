apiVersion: v1
kind: ServiceAccount
metadata:
  name: selfops-remediation
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: selfops-remediation-role
  namespace: platform
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: selfops-remediation-binding
  namespace: platform
subjects:
  - kind: ServiceAccount
    name: selfops-remediation
    namespace: platform
roleRef:
  kind: Role
  name: selfops-remediation-role
  apiGroup: rbac.authorization.k8s.io
