apiVersion: apps/v1
kind: Deployment
metadata:
  name: selfops-demo-app
  namespace: platform
  labels:
    app: selfops-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: selfops-demo-app
  template:
    metadata:
      labels:
        app: selfops-demo-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: demo-app
          image: python:3.11-slim
          command: ["python", "-c"]
          args:
            - |
              import http.server, threading, time, os, sys
              class Handler(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                  if self.path == '/health':
                    self.send_response(200)
                    self.end_headers()
                    self.wfile.write(b'ok')
                  elif self.path == '/crash':
                    self.send_response(200)
                    self.end_headers()
                    self.wfile.write(b'crashing...')
                    threading.Thread(target=lambda: (time.sleep(1), os._exit(1))).start()
                  elif self.path == '/stress-cpu':
                    self.send_response(200)
                    self.end_headers()
                    self.wfile.write(b'stressing cpu for 60s...')
                    def burn():
                      end = time.time() + 60
                      while time.time() < end:
                        x = sum(i*i for i in range(10000))
                    threading.Thread(target=burn).start()
                  elif self.path == '/leak-memory':
                    self.send_response(200)
                    self.end_headers()
                    self.wfile.write(b'leaking memory...')
                    leak = []
                    def grow():
                      while True:
                        leak.append(' ' * 1024 * 1024)
                        time.sleep(0.5)
                    threading.Thread(target=grow, daemon=True).start()
                  else:
                    self.send_response(200)
                    self.end_headers()
                    self.wfile.write(b'selfops demo app running')
                def log_message(self, fmt, *args):
                  print(f"[demo-app] {fmt % args}", flush=True)
              print("SelfOps demo app starting on :8080", flush=True)
              http.server.HTTPServer(('', 8080), Handler).serve_forever()
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: selfops-demo-app
  namespace: platform
spec:
  selector:
    app: selfops-demo-app
  ports:
    - port: 8080
      targetPort: 8080
