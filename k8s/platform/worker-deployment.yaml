apiVersion: apps/v1
kind: Deployment
metadata:
  name: selfops-worker
  namespace: platform
  labels:
    app: selfops-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selfops-worker
  template:
    metadata:
      labels:
        app: selfops-worker
    spec:
      serviceAccountName: selfops-remediation
      containers:
        - name: worker
          image: docker.io/library/selfops-worker:latest
          imagePullPolicy: Never
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: selfops-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql+asyncpg://selfops:$(POSTGRES_PASSWORD)@postgres-postgresql.platform.svc.cluster.local:5432/selfops"
            - name: REDIS_URL
              value: "redis://redis-master.platform.svc.cluster.local:6379"
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: selfops-secrets
                  key: openrouter-api-key
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: selfops-secrets
                  key: telegram-bot-token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: selfops-secrets
                  key: telegram-chat-id
            - name: PROMETHEUS_URL
              value: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
            - name: LOKI_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"
            - name: ANALYSIS_SERVICE_URL
              value: "http://selfops-analysis.platform.svc.cluster.local:8001"
            - name: FRONTEND_URL
              value: "http://app.89.167.95.204.nip.io"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
